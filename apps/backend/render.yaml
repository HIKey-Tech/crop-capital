# Render.com Blueprint for CropCapital Backend

services:
  - type: web
    name: cropcapital-backend
    runtime: node
    region: frankfurt # Change to your preferred region
    plan: free # Change to 'starter' or 'standard' for production

    buildCommand: npm install && npm run build
    startCommand: npm start

    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false # Set manually in Render dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: PAYSTACK_SECRET_KEY
        sync: false # Set manually in Render dashboard
      - key: PAYSTACK_PUBLIC_KEY
        sync: false # Set manually in Render dashboard
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_PORT
        value: 587
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: FRONTEND_URL
        sync: false # Set to your Vercel frontend URL (e.g. https://www.cropcapitals.com)

      # --- Tenant resolution ---
      - key: ALLOWED_ORIGINS
        sync: false # Comma-separated list of trusted frontend origins, e.g. https://www.cropcapitals.com
      - key: PLATFORM_ROOT_DOMAIN
        sync:
          false # Root domain for subdomain-based tenant resolution, e.g. cropcapitals.com
          # Once set, a CNAME of cropcapital.cropcapitals.com → crop-capital.onrender.com
          # is enough for the middleware to extract the tenant slug automatically.
      - key: DEFAULT_TENANT_SLUG
        sync: false # Fallback slug used only in non-production; leave blank in production
      - key: TENANT_HEADER_SECRET
        sync: false # Shared secret for server-to-server X-Tenant-Slug trust; optional
      - key: TENANCY_STRICT_MODE
        value: "false" # Set to "true" to reject requests that cannot resolve a tenant

    healthCheckPath: /

    autoDeploy: true # Auto-deploy when code is pushed to main branch
